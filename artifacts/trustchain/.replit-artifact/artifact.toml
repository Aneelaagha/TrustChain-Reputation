kind = "web"
previewPath = "/"
title = "TrustChain"
version = "1.0.0"
id = "artifacts/trustchain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18487

[services.development]
run = "pnpm --filter @workspace/trustchain run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trustchain", "run", "build" ]
publicDir = "artifacts/trustchain/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18487"
BASE_PATH = "/"
